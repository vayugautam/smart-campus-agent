services:
  - type: web
    name: campus-agent-api
    env: python
    buildCommand: "pip install -r requirements.txt && python -m app.data.seed"
    startCommand: "uvicorn app.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GROQ_API_KEY
        sync: false # You will need to enter this in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0

staticSites:
  - name: campus-agent-ui
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: campus-agent-api
          envVarKey: RENDER_EXTERNAL_URL
